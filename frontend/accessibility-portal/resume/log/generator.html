<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Generator</title>

  <!-- External Libraries -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f0f2f5;
      display: flex;
      height: 100vh;
    }

    .container {
      display: flex;
      width: 100%;
    }

    .form-section, .preview-section {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .form-section {
      background: #fff;
      border-right: 1px solid #ccc;
    }

    .preview-section {
      background: #eaf0f6;
    }

    h2 {
      margin-top: 0;
    }

    label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    input, textarea {
      width: 100%;
      padding: 8px 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      background-color: #007bff;
      border: none;
      color: white;
      font-size: 16px;
      border-radius: 6px;
      cursor: pointer;
    }

    .resume-box {
      background: white;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
      width: 100%;
    }

    .resume-box h1 {
      margin: 0;
      font-size: 26px;
      color: #222;
    }

    .resume-box h3 {
      margin-top: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
      font-size: 18px;
    }

    .resume-box p {
      margin: 5px 0;
      font-size: 14px;
      color: #333;
    }

    .skill {
      display: inline-block;
      background: #cce5ff;
      color: #004085;
      padding: 4px 10px;
      margin: 3px;
      border-radius: 4px;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- Form Section -->
  <div class="form-section">
    <h2>Fill Your Details</h2>
    <label>Full Name</label>
    <input type="text" id="name" oninput="updateResume()" placeholder="John Doe" />

    <label>Email</label>
    <input type="email" id="email" oninput="updateResume()" placeholder="john@example.com" />

    <label>Phone</label>
    <input type="text" id="phone" oninput="updateResume()" placeholder="+123456789" />

    <label>Summary</label>
    <textarea id="summary" rows="3" oninput="updateResume()"></textarea>

    <label>Experience</label>
    <textarea id="experience" rows="4" oninput="updateResume()"></textarea>

    <label>Education</label>
    <textarea id="education" rows="3" oninput="updateResume()"></textarea>

    <label>Skills (comma separated)</label>
    <input type="text" id="skills" oninput="updateResume()" placeholder="HTML, CSS, JavaScript" />

    <button onclick="downloadResume()">Download Resume as PDF</button>
  </div>

  <!-- Resume Preview Section -->
  <div class="preview-section">
    <div class="resume-box" id="resume">
      <h1 id="displayName">Your Name</h1>
      <p id="displayEmail">Email: example@mail.com</p>
      <p id="displayPhone">Phone: 0000000000</p>

      <h3>Summary</h3>
      <p id="displaySummary">Write a brief summary here.</p>

      <h3>Experience</h3>
      <p id="displayExperience">Mention your job experiences.</p>

      <h3>Education</h3>
      <p id="displayEducation">Mention your education details.</p>

      <h3>Skills</h3>
      <div id="displaySkills">
        <span class="skill">Skill1</span>
        <span class="skill">Skill2</span>
      </div>
    </div>
  </div>
</div>

<script>
  function updateResume() {
    document.getElementById('displayName').innerText = document.getElementById('name').value || "Your Name";
    document.getElementById('displayEmail').innerText = "Email: " + (document.getElementById('email').value || "example@mail.com");
    document.getElementById('displayPhone').innerText = "Phone: " + (document.getElementById('phone').value || "0000000000");
    document.getElementById('displaySummary').innerText = document.getElementById('summary').value || "Write a brief summary here.";
    document.getElementById('displayExperience').innerText = document.getElementById('experience').value || "Mention your job experiences.";
    document.getElementById('displayEducation').innerText = document.getElementById('education').value || "Mention your education details.";

    const skills = document.getElementById('skills').value.split(',').map(s => s.trim()).filter(Boolean);
    const skillsContainer = document.getElementById('displaySkills');
    skillsContainer.innerHTML = "";
    skills.forEach(skill => {
      const span = document.createElement("span");
      span.className = "skill";
      span.innerText = skill;
      skillsContainer.appendChild(span);
    });
  }

  async function downloadResume() {
    const { jsPDF } = window.jspdf;
    const resume = document.getElementById("resume");

    const canvas = await html2canvas(resume, { scale: 2 });
    const imgData = canvas.toDataURL("image/png");

    const pdf = new jsPDF("p", "mm", "a4");
    const pdfWidth = pdf.internal.pageSize.getWidth();
    const imgProps = pdf.getImageProperties(imgData);
    const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

    pdf.addImage(imgData, "PNG", 0, 0, pdfWidth, pdfHeight);
    pdf.save("Resume.pdf");
  }

  // Initialize with default content
  updateResume();
</script>

</body>
</html>
