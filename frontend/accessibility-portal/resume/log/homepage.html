<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ResuFlow | Home</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      color: #333;
    }
    html, body {
  height: 100%;
  display: flex;
  flex-direction: column;
}

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #111;
      padding: 1rem 2rem;
      color: white;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .navbar .logo img {
      height: 40px;
      margin-right: 10px;
    }

    .navbar .resu {
      color: white;
    }

    .navbar .flow {
      color: #4f8cf7;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .navbar a:hover {
      color: #00bcd4;
    }

    /* Hero Section */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 20px;
      text-align: center;
      background: linear-gradient(135deg, #e0f7fa, #fff);
    }

    .hero h1 {
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    .hero p {
      font-size: 1.1rem;
      color: #555;
      max-width: 600px;
    }

    .buttons {
      margin-top: 2rem;
    }

    .buttons button {
      background-color: #00bcd4;
      color: white;
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      margin: 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.3s;
    }

    .buttons button:hover {
      background-color: #0097a7;
    }

    /* Footer */
    footer {
  text-align: center;
  padding: 1.5rem;
  background-color: #111;
  color: #bbb;
  margin-top: auto; /* Pushes the footer to the bottom */
}

  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <img src="fe17ddeb-1368-4f08-a17e-1668ffcd313a.png" alt="ResuFlow Logo" />
      <span class="resu">Resu</span><span class="flow">Flow</span>
    </div>
    <div>
      
      <a href="templates.html">Templates</a>
<a href="about.html">About</a>
      <a href="login.html">Login</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Create Your Professional Resume</h1>
    <p>Build a stunning resume in minutes with our easy-to-use online builder. Choose from templates, customize your design, and export instantly!</p>
    <div class="buttons">
      <button onclick="startBuilding()">Start Building</button>
      <button onclick="viewTemplates()">View Templates</button>
    </div>
  </div>

  <footer>
    © 2025 ResuFlow. All rights reserved.
  </footer>

  <script>
    function startBuilding() {
      window.location.href = "start.html";
    }

    function viewTemplates() {
      window.location.href = "templates.html";
    }
  </script>

</body>
</html>
