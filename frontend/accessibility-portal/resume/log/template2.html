<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Resume Template</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background: #f4f4f4;
      display: flex;
      gap: 30px;
      padding: 20px;
    }

    /* Input Form Styles */
    .form-container {
      width: 35%;
      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 8px rgba(0,0,0,0.1);
    }

    .form-container h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .form-container label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }

    .form-container input, .form-container textarea {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      border: 1px solid #ccc;
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .form-container button {
      width: 100%;
      background: #222;
      color: white;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* Resume Preview Styles */
    .resume-container {
      width: 65%;
      display: flex;
      box-shadow: 0 0 12px rgba(0,0,0,0.15);
    }

    .left-panel {
      background: #e5ebf3;
      color: #000;
      width: 35%;
      padding: 20px;
    }

    .left-panel img {
      width: 100%;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .left-panel h3 {
      margin-top: 20px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }

    .left-panel p {
      font-size: 14px;
    }

    .right-panel {
      background: #1f1f1f;
      color: white;
      width: 65%;
      padding: 30px;
    }

    .right-panel h1 {
      font-size: 28px;
      margin: 0;
    }

    .right-panel h2 {
      color: #5ca0f2;
      font-weight: 400;
      font-size: 18px;
      margin: 4px 0 20px;
    }

    .right-panel h3 {
      margin-top: 20px;
      border-bottom: 1px solid #555;
      padding-bottom: 6px;
    }

    .right-panel p {
      font-size: 14px;
      margin-top: 8px;
    }

  </style>
</head>
<body>

  <!-- Input Form -->
  <div class="form-container">
    <h2>Resume Builder</h2>

    <label>Profile Image URL</label>
    <input type="text" id="photo" placeholder="https://example.com/photo.jpg">

    <label>Full Name</label>
    <input type="text" id="name">

    <label>Job Title</label>
    <input type="text" id="title">

    <label>Contact Info</label>
    <textarea id="contact"></textarea>

    <label>Education</label>
    <textarea id="education"></textarea>

    <label>Experience</label>
    <textarea id="experience"></textarea>

    <label>Communication Skills</label>
    <textarea id="communication"></textarea>

    <label>Leadership</label>
    <textarea id="leadership"></textarea>

    <label>References</label>
    <input type="text" id="references">

   <a href="template2output.html" onclick="updateResume()" style="display: inline-block; text-align: center; padding: 10px; background-color: #222; color: white; text-decoration: none; border-radius: 6px; font-size: 16px; width: 100%;">Update Resume</a>

  </div>

  <!-- Resume Output -->
  <div class="resume-container">
    <div class="left-panel">
      <img id="displayPhoto" src="https://via.placeholder.com/200x200" alt="Profile Photo">
      <h3>CONTACT</h3>
      <p id="displayContact">Your contact info here.</p>

      <h3>COMMUNICATION</h3>
      <p id="displayCommunication">Communication strengths...</p>

      <h3>LEADERSHIP</h3>
      <p id="displayLeadership">Leadership experience...</p>
    </div>

    <div class="right-panel">
      <h1 id="displayName">YOUR NAME</h1>
      <h2 id="displayTitle">Your Job Title</h2>

      <h3>EDUCATION</h3>
      <p id="displayEducation">Your education history.</p>

      <h3>EXPERIENCE</h3>
      <p id="displayExperience">Your experience info.</p>

      <h3>REFERENCES</h3>
      <p id="displayReferences">Available upon request</p>
    </div>
  </div>

  <script>
    function updateResume() {
      document.getElementById("displayName").innerText = document.getElementById("name").value || "Your Name";
      document.getElementById("displayTitle").innerText = document.getElementById("title").value || "Your Title";
      document.getElementById("displayContact").innerText = document.getElementById("contact").value || "Contact Info Here";
      document.getElementById("displayEducation").innerText = document.getElementById("education").value || "Education Info";
      document.getElementById("displayExperience").innerText = document.getElementById("experience").value || "Experience Info";
      document.getElementById("displayCommunication").innerText = document.getElementById("communication").value || "Communication skills here.";
      document.getElementById("displayLeadership").innerText = document.getElementById("leadership").value || "Leadership experience here.";
      document.getElementById("displayReferences").innerText = document.getElementById("references").value || "Available upon request";

      const photoUrl = document.getElementById("photo").value;
      if (photoUrl) {
        document.getElementById("displayPhoto").src = photoUrl;
      }
    }
  </script>

</body>
</html>
