<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ResuFlow | Templates</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #f4f6f8;
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #111;
      padding: 1rem 2rem;
      color: white;
    }

    .navbar .logo {
      display: flex;
      align-items: center;
      font-size: 1.8rem;
      font-weight: bold;
    }

    .navbar .logo img {
      height: 40px;
      margin-right: 10px;
    }

    .navbar .resu {
      color: white;
    }

    .navbar .flow {
      color: #4f8cf7;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      margin-left: 20px;
      font-weight: 500;
    }

    .navbar a:hover {
      color: #00bcd4;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: linear-gradient(135deg, #e0f7fa, #fff);
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .hero p {
      color: #555;
    }

    .template-container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 30px;
  padding: 40px 20px;
  width: 100%;
  max-width: 1200px;
  margin: 0 auto;
}


    .template-card {
  background: white;
  padding: 16px;
  border-radius: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  text-align: center;
  transition: transform 0.3s;
  cursor: pointer;
  max-width: 340px;
  margin: 0 auto;
}

    .template-card:hover {
      transform: translateY(-5px);
    }

   .template-card img {
  width: 100%;
  height: 420px;
  object-fit: cover;
  border-radius: 6px;
  margin-bottom: 12px;
}

    .template-card button {
      background-color: #00bcd4;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    .template-card button:hover {
      background-color: #0097a7;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background-color: #111;
      color: #bbb;
      margin-top: auto;
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <div class="navbar">
    <div class="logo">
      <img src="fe17ddeb-1368-4f08-a17e-1668ffcd313a.png" alt="ResuFlow Logo" />
      <span class="resu">Resu</span><span class="flow">Flow</span>
    </div>
    <div>
      <a href="homepage.html">Home</a>
      <a href="templates.html">Templates</a>
      <a href="#">About</a>
      <a href="#">Login</a>
    </div>
  </div>

  <!-- HERO -->
  <div class="hero">
    <h1>Choose Your Resume Template</h1>
    <p>Select a template that suits your style and career goals</p>
  </div>

  <!-- TEMPLATE CARDS -->
  <div class="template-container">
    <div class="template-card">
  <img src="ChatGPT Image Jun 18, 2025, 01_16_55 PM.png" alt="Template 1" />
  <h3>Modern Template</h3>
  <a href="template1.html">
    <button>Use Template</button>
  </a>
</div>

<div class="template-card">
  <img src="Screenshot 2025-06-18 132450.png" alt="Template 2" />
  <h3>Classic Template</h3>
  <a href="#" onclick="selectTemplate(2); return false;" style="display: inline-block; padding: 8px 16px; background-color: #007bff; color: white; text-decoration: none; border-radius: 6px;">
    Use Template
  </a>
</div>

    <div class="template-card">
      <img src="Screenshot 2025-06-18 132613.png" alt="Template 3" />
      <h3>Creative Template</h3>
      <button onclick="selectTemplate(3)">Use Template</button>
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    © 2025 ResuFlow. All rights reserved.
  </footer>

  <script>
    function selectTemplate(id) {
      window.location.href = `build.html?template=${id}`;
    }
  </script>
</body>
</html>
