<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | Resume Builder</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f5f7fa;
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background-color: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.15);
      width: 350px;
    }

    .login-box h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    .login-box label {
      display: block;
      margin-top: 15px;
      font-weight: 600;
    }

    .login-box input {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 14px;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      margin-top: 25px;
      background-color: #2e2e2e;
      color: white;
      border: none;
      font-size: 16px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
    }

    .login-btn:hover {
      background-color: #444;
    }

    .error {
      color: red;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Enter your username">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your password">

    <button class="login-btn" onclick="validateLogin()">Login</button>
    <div id="error" class="error"></div>
  </div>

  <script>
    function validateLogin() {
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const errorDiv = document.getElementById("error");

      // You can change this to your actual user check
      const validUser = "goyalvrusha@gmail.com";
      const validPass = "1234";

      if (username === validUser && password === validPass) {
        // Redirect to your resume builder page
        window.location.href = "afterlogin.html";
      } else {
        errorDiv.textContent = "Invalid username or password!";
      }
    }
  </script>

</body>
</html>
